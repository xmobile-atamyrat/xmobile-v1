# Local-only: mirrors prod VM paths under /home/ubuntu/images/...
# Run via docker compose (see docker-compose.yml). Next.js proxies /media/* when LOCAL_NGINX_MEDIA_ORIGIN is set.

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10M;

    location ^~ /media/product/bad/ {
        alias /home/ubuntu/images/compressed/products/bad/;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ^~ /media/product/good/ {
        alias /home/ubuntu/images/compressed/products/good/;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ^~ /media/product/original/ {
        alias /home/ubuntu/images/products/;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ^~ /media/category/ {
        alias /home/ubuntu/images/categories/;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ^~ /media/banner/ {
        alias /home/ubuntu/images/banners/;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        return 404;
    }
}
