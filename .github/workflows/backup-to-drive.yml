# Daily backup: run backup on VM, copy db + images to runner, upload to Google Drive.
# Keeps only the latest 3 backup folders under xmobile/backup.
# Schedule: midnight UTC. Manual run: Actions → Daily Backup to Drive → Run workflow.
name: Daily Backup to Drive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  BACKUP_DIR_ON_VM_DB: /home/ubuntu/db_backup
  BACKUP_DIR_ON_VM_IMAGES: /home/ubuntu/tar-file

jobs:
  backup:
    name: Backup and upload
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Setup SSH key and config
        env:
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          VM_SSH_KEY_PASSPHRASE: ${{ secrets.VM_SSH_KEY_PASSPHRASE }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          if [ -n "$VM_SSH_KEY_PASSPHRASE" ]; then
            echo 'echo "$VM_SSH_KEY_PASSPHRASE"' > ~/.ssh/askpass.sh
            chmod +x ~/.ssh/askpass.sh
            export SSH_ASKPASS=~/.ssh/askpass.sh
            export SSH_ASKPASS_REQUIRE=force
            export DISPLAY=:0
          fi
          ssh-add ~/.ssh/id_rsa
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Configure SSH for VM
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config << EOF
          Host deploy-vm
            HostName $VM_HOST
            User $VM_USER
            Port $VM_SSH_PORT
            StrictHostKeyChecking accept-new
          EOF
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_PORT: ${{ secrets.VM_SSH_PORT }}

      - name: Run backup on VM
        run: ssh deploy-vm "/home/ubuntu/scripts/backup-data.sh all"

      - name: Copy backup files from VM to runner
        run: |
          mkdir -p backup
          scp deploy-vm:${{ env.BACKUP_DIR_ON_VM_IMAGES }}/images.tar.gz backup/
          scp deploy-vm:${{ env.BACKUP_DIR_ON_VM_DB }}/db_backup.sql backup/

      - name: Install rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.zip
          unzip -o rclone-current-linux-amd64.zip
          sudo cp rclone-*-linux-amd64/rclone /usr/local/bin/
          rclone version

      - name: Configure rclone and upload to Google Drive
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_FOLDER: ${{ secrets.GDRIVE_FOLDER }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s\n' "$GDRIVE_SA_JSON" > /tmp/gdrive-sa.json
          chmod 600 /tmp/gdrive-sa.json
          cat > ~/.config/rclone/rclone.conf << 'RCLONE'
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /tmp/gdrive-sa.json
          RCLONE

          BACKUP_DATE=$(date -u +%Y-%m-%d)
          REMOTE_PATH="gdrive:${GDRIVE_FOLDER}/${BACKUP_DATE}"
          echo "Uploading to $REMOTE_PATH"
          rclone copy backup/ "$REMOTE_PATH/" -v

      - name: Prune old backups (keep 3)
        env:
          GDRIVE_FOLDER: ${{ secrets.GDRIVE_FOLDER }}
        run: |
          FOLDERS=$(rclone lsd "gdrive:${GDRIVE_FOLDER}" --format "p" 2>/dev/null | sort)
          COUNT=$(echo "$FOLDERS" | grep -c . || true)
          if [ "$COUNT" -gt 3 ]; then
            TO_DELETE=$((COUNT - 3))
            echo "$FOLDERS" | head -n "$TO_DELETE" | while read -r dir; do
              [ -z "$dir" ] && continue
              echo "Removing old backup: $dir"
              rclone purge "gdrive:${GDRIVE_FOLDER}/${dir}" -v
            done
          else
            echo "Total backup folders: $COUNT (no pruning needed)"
          fi
