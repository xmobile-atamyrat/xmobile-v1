# Manual TestFlight upload (workflow_dispatch). Secrets: docs/mobile/ios/README.md

name: iOS TestFlight upload

on:
  workflow_dispatch:

concurrency:
  group: ios-testflight-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-upload:
    name: Build and upload
    runs-on: macos-14
    timeout-minutes: 120
    environment: ios-appstore-release
    defaults:
      run:
        working-directory: mobile

    env:
      IOS_BUNDLE_ID: com.xmobile.app
      NODE_OPTIONS: --max-old-space-size=8192

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: mobile/yarn.lock

      - run: yarn install --frozen-lockfile

      - run: bundle install --jobs 4 --retry 3

      - name: GoogleService-Info.plist
        env:
          IOS_GOOGLESERVICE_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLESERVICE_INFO_PLIST_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${IOS_GOOGLESERVICE_INFO_PLIST_BASE64:-}" ]; then
            echo "Missing secret IOS_GOOGLESERVICE_INFO_PLIST_BASE64"
            exit 1
          fi
          echo -n "$IOS_GOOGLESERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/mobile/GoogleService-Info.plist

      - run: bundle exec pod install --project-directory=ios

      - uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_P12_PASSWORD }}
          keychain-password: ${{ secrets.IOS_CI_KEYCHAIN_PASSWORD }}

      - name: Provisioning profile
        env:
          IOS_APPSTORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${IOS_APPSTORE_PROVISIONING_PROFILE_BASE64:-}" ]; then
            echo "Missing secret IOS_APPSTORE_PROVISIONING_PROFILE_BASE64"
            exit 1
          fi
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo -n "$IOS_APPSTORE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

      - name: ExportOptions.plist
        env:
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          IOS_BUNDLE_ID: com.xmobile.app
        run: |
          set -euo pipefail
          if [ -z "${IOS_DEVELOPMENT_TEAM:-}" ] || [ -z "${IOS_PROVISIONING_PROFILE_NAME:-}" ]; then
            echo "Missing IOS_DEVELOPMENT_TEAM or IOS_PROVISIONING_PROFILE_NAME"
            exit 1
          fi
          python3 -c "
          import os, pathlib, textwrap
          team = os.environ['IOS_DEVELOPMENT_TEAM']
          prof = os.environ['IOS_PROVISIONING_PROFILE_NAME']
          bid = os.environ['IOS_BUNDLE_ID']
          body = textwrap.dedent(f'''\
          <?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>{team}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>{bid}</key>
              <string>{prof}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          ''')
          pathlib.Path('ios/ExportOptions.plist').write_text(body)
          "
          /usr/libexec/PlistBuddy -c 'Print' ios/ExportOptions.plist >/dev/null

      - name: Archive
        working-directory: mobile/ios
        env:
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -workspace mobile.xcworkspace \
            -scheme mobile \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/mobile.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$IOS_DEVELOPMENT_TEAM" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME"

      - name: Export IPA
        working-directory: mobile/ios
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/mobile.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

      - run: sudo gem install fastlane -N

      - name: Upload
        env:
          IOS_APP_STORE_CONNECT_API_KEY_JSON: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${IOS_APP_STORE_CONNECT_API_KEY_JSON:-}" ]; then
            echo "Missing secret IOS_APP_STORE_CONNECT_API_KEY_JSON"
            exit 1
          fi
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name '*.ipa' | head -n 1)
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "IPA not found under $RUNNER_TEMP/export"
            exit 1
          fi
          printf '%s\n' "$IOS_APP_STORE_CONNECT_API_KEY_JSON" > "$RUNNER_TEMP/api_key.json"
          fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path "$RUNNER_TEMP/api_key.json" \
            --skip_waiting_for_build_processing
          rm -f "$RUNNER_TEMP/api_key.json"
