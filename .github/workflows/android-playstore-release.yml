# Manual Play Store upload: build job assembles a signed AAB; upload job sends it to Play Console.
# If upload fails: Actions → failed run → Re-run failed jobs (skips rebuild when build succeeded).

name: Android Play Store upload

on:
  workflow_dispatch:
    inputs:
      android_version_name:
        description: 'versionName shown to users, e.g. 1.0.2'
        required: true
        type: string
      android_track:
        description: 'Play Console track to release to'
        required: true
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production

concurrency:
  group: android-playstore-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: android-playstore-release
    defaults:
      run:
        working-directory: mobile

    env:
      ANDROID_PACKAGE_NAME: com.xmobile.app
      NODE_OPTIONS: --max-old-space-size=8192

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-mobile-node-${{ hashFiles('mobile/yarn.lock') }}-v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: mobile/yarn.lock

      - run: yarn install --frozen-lockfile

      - name: google-services.json
        env:
          ANDROID_GOOGLESERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLESERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_GOOGLESERVICES_JSON_BASE64:-}" ]; then
            echo "Missing secret ANDROID_GOOGLESERVICES_JSON_BASE64"
            exit 1
          fi
          echo -n "$ANDROID_GOOGLESERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      - name: Release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Missing secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Set Android version for release
        env:
          ANDROID_VERSION_NAME_INPUT: ${{ inputs.android_version_name }}
        run: |
          set -euo pipefail
          VERSION_NAME="${ANDROID_VERSION_NAME_INPUT// /}"
          if [ -z "$VERSION_NAME" ]; then
            echo "android_version_name is required"
            exit 1
          fi
          if ! [[ "$VERSION_NAME" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "android_version_name must look like 1, 1.0, or 1.0.3 (got: $VERSION_NAME)"
            exit 1
          fi
          echo "ANDROID_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "Release version: $VERSION_NAME (versionCode ${{ github.run_number }})"

      - name: Build release AAB
        working-directory: mobile/android
        env:
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MYAPP_UPLOAD_STORE_PASSWORD:-}" ] || [ -z "${MYAPP_UPLOAD_KEY_ALIAS:-}" ] || [ -z "${MYAPP_UPLOAD_KEY_PASSWORD:-}" ]; then
            echo "Missing ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, or ANDROID_KEY_PASSWORD"
            exit 1
          fi
          ./gradlew bundleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=release.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD="$MYAPP_UPLOAD_STORE_PASSWORD" \
            -PMYAPP_UPLOAD_KEY_ALIAS="$MYAPP_UPLOAD_KEY_ALIAS" \
            -PMYAPP_UPLOAD_KEY_PASSWORD="$MYAPP_UPLOAD_KEY_PASSWORD" \
            -PVERSION_CODE="${{ github.run_number }}" \
            -PVERSION_NAME="$ANDROID_VERSION_NAME"
          AAB_PATH=$(find app/build/outputs/bundle/release -name '*.aab' | head -n 1)
          if [ -z "$AAB_PATH" ] || [ ! -f "$AAB_PATH" ]; then
            echo "AAB not found under app/build/outputs/bundle/release"
            exit 1
          fi
          echo "aab_path=mobile/android/$AAB_PATH" >> "$GITHUB_OUTPUT"
        id: bundle

      - uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: ${{ steps.bundle.outputs.aab_path }}
          retention-days: 14
          if-no-files-found: error

  upload:
    name: Upload to Play Console
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: android-playstore-release

    env:
      ANDROID_PACKAGE_NAME: com.xmobile.app

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-release-aab
          path: aab

      - name: Service account key
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "Missing secret GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
            exit 1
          fi
          printf '%s\n' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/play-service-account.json"

      - name: Locate AAB
        id: locate
        run: |
          set -euo pipefail
          AAB_PATH=$(find aab -name '*.aab' | head -n 1)
          if [ -z "$AAB_PATH" ] || [ ! -f "$AAB_PATH" ]; then
            echo "AAB artifact missing (expected aab/*.aab)"
            exit 1
          fi
          echo "aab_path=$AAB_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload to Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ runner.temp }}/play-service-account.json
          packageName: ${{ env.ANDROID_PACKAGE_NAME }}
          releaseFiles: ${{ steps.locate.outputs.aab_path }}
          track: ${{ inputs.android_track }}
          status: completed

      - name: Clean up service account key
        if: always()
        run: rm -f "$RUNNER_TEMP/play-service-account.json"
